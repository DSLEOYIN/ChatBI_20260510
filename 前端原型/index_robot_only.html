<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广汽国际 AI 助手</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #ffffff;
    height: 100vh;
    overflow: hidden;
    color: #2b2f36;
  }

  /* ===== AI Assistant Launcher ===== */
  .assistant-launcher {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 68px;
    height: 68px;
    border: none;
    padding: 0;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 9999;
    outline: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    opacity: 1;
    transform: scale(1);
    transition: opacity 0.42s ease, transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: opacity, transform;
  }

  .assistant-launcher.dragging {
    cursor: default;
  }

  .assistant-launcher.is-hidden {
    opacity: 0;
    transform: scale(0.88);
    pointer-events: none;
  }

  .launcher-core {
    position: relative;
    width: 68px;
    height: 68px;
    border-radius: 24px;
    background: linear-gradient(145deg, #3a3a3a 0%, #1f1f1f 38%, #0f0f0f 74%, #000000 100%);
    box-shadow: 0 18px 40px rgba(15, 15, 15, 0.32), inset 0 1px 0 rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.28s ease, box-shadow 0.28s ease, border-radius 0.28s ease;
    border: 1px solid rgba(255,255,255,0.3);
    overflow: hidden;
  }

  .launcher-core::before {
    content: '';
    position: absolute;
    inset: 2px 2px auto 2px;
    height: 42%;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.08) 100%);
    pointer-events: none;
  }

  .launcher-core::after {
    content: '';
    position: absolute;
    inset: auto -12px -18px auto;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,214,164,0.3) 0%, rgba(255,214,164,0) 72%);
    pointer-events: none;
  }

  .assistant-launcher:hover .launcher-core {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 24px 48px rgba(15, 15, 15, 0.38), inset 0 1px 0 rgba(255,255,255,0.24);
    border-radius: 26px;
  }

  .assistant-launcher:active .launcher-core,
  .assistant-launcher.dragging .launcher-core {
    transform: scale(0.97);
    box-shadow: 0 14px 26px rgba(15, 15, 15, 0.26);
  }

  .launcher-icon {
    width: 52px;
    height: 52px;
    position: relative;
    z-index: 1;
    border-radius: 18px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
    backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -8px 18px rgba(0, 0, 0, 0.26);
    cursor: pointer;
    touch-action: none;
  }

  .assistant-launcher.dragging .launcher-icon {
    cursor: pointer;
  }

  .launcher-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transform: none;
  }

  .launcher-glow {
    position: absolute;
    inset: auto auto 8px 8px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 72%);
    pointer-events: none;
  }

  .badge-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 12px;
    height: 12px;
    background: linear-gradient(180deg, #5ef0a2 0%, #1bb96b 100%);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.96);
    box-shadow: 0 0 0 4px rgba(30, 194, 110, 0.12);
    z-index: 1;
  }

  /* ===== Assistant Panel (Chat Dialog) ===== */
  .assistant-panel {
    position: fixed;
    bottom: 116px;
    right: 32px;
    width: 440px;
    height: 680px;
    background: linear-gradient(180deg, #ffffff 0%, #fcfdff 100%);
    border-radius: 28px;
    box-shadow: 0 34px 80px rgba(15, 23, 42, 0.18);
    border: 1px solid rgba(228, 235, 245, 0.92);
    backdrop-filter: blur(18px);
    display: flex;
    flex-direction: column;
    z-index: 9998;
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transform: scale(0.92);
    transition:
      opacity 0.3s ease,
      transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
    touch-action: none;
    will-change: opacity, transform;
  }

  .assistant-panel::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 96px;
    background: linear-gradient(180deg, rgba(17, 17, 17, 0.07) 0%, rgba(255,255,255,0) 100%);
    pointer-events: none;
  }

  .assistant-panel.opening,
  .assistant-panel.closing,
  .assistant-panel.open {
    visibility: visible !important;
  }

  .assistant-panel.open {
    transform: scale(1) !important;
    opacity: 1 !important;
    pointer-events: auto !important;
  }

  .assistant-panel.dragging {
    transition: none;
  }

  /* Panel Header */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,251,250,0.95) 100%);
    border-bottom: 1px solid rgba(240, 242, 245, 0.9);
    position: relative;
    z-index: 1;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }

  .assistant-panel.dragging .panel-header {
    cursor: grabbing;
  }

  .panel-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .panel-avatar {
    width: 38px;
    height: 38px;
    border-radius: 14px;
    background: linear-gradient(145deg, #2d2d2d 0%, #141414 52%, #000000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 18px rgba(15, 15, 15, 0.2);
    overflow: hidden;
  }

  .panel-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 700;
    color: #18202f;
    letter-spacing: 0.2px;
  }

  .panel-subtitle {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: #8f97a5;
  }

  .panel-header-actions {
    display: flex;
    gap: 16px;
  }

  .panel-header-actions button {
    width: 30px;
    height: 30px;
    background: rgba(245, 247, 250, 0.9);
    border: 1px solid rgba(228, 232, 238, 0.95);
    cursor: pointer;
    padding: 0;
    border-radius: 10px;
    color: #7f8897;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel-header-actions button:hover {
    background: #f3f4f6;
    border-color: #d7dbe1;
    color: #111111;
  }

  /* Panel Nav - 标签切换 */
  .panel-nav {
    display: flex;
    gap: 4px;
    padding: 8px 16px 0;
    position: relative;
    z-index: 1;
    background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,251,250,0.95) 100%);
    border-bottom: 1px solid rgba(240, 242, 245, 0.9);
  }

  .panel-nav-btn {
    border: none;
    background: transparent;
    color: #8f97a5;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.4;
    border-radius: 8px 8px 0 0;
    position: relative;
  }

  .panel-nav-btn::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: transparent;
    border-radius: 2px 2px 0 0;
    transition: all 0.2s;
  }

  .panel-nav-btn:hover:not(.active) {
    color: #4c5667;
    background: rgba(0, 0, 0, 0.03);
  }

  .panel-nav-btn.active {
    color: #111111;
    background: transparent;
    font-weight: 600;
  }

  .panel-nav-btn.active::after {
    background: #111111;
  }

  .assistant-page {
    display: none;
    flex: 1;
    min-height: 0;
  }

  .assistant-page.active {
    display: flex;
    flex-direction: column;
  }

  #assistantChatPage {
    background: linear-gradient(180deg, #f8fafd 0%, #f4f7fb 100%);
  }

  #assistantHistoryPage {
    background: linear-gradient(180deg, #fafbfc 0%, #f5f7fa 100%);
    padding: 0;
  }

  .history-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .history-view-header {
    padding: 16px;
    border-bottom: 1px solid #e8edf4;
  }

  .history-new-chat-btn {
    width: 100%;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #252525 0%, #050505 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(15, 15, 15, 0.2);
  }

  .history-new-chat-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(15, 15, 15, 0.28);
    background: linear-gradient(135deg, #323232 0%, #151515 100%);
  }

  .history-view-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .history-view-list::-webkit-scrollbar {
    width: 4px;
  }

  .history-view-list::-webkit-scrollbar-thumb {
    background: #d0d5dd;
    border-radius: 2px;
  }

  .history-view-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 6px;
    background: #fff;
    border: 1px solid transparent;
  }

  .history-view-item:hover {
    background: #fff;
    border-color: #e8ebf0;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    transform: translateY(-1px);
  }

  .history-view-item.active {
    background: #f5f6f8;
    border-color: #e2e5e9;
  }

  .history-view-item-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #f8f9fb 0%, #f1f3f5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .history-view-item-icon svg {
    width: 18px;
    height: 18px;
    color: #6b7280;
  }

  .history-view-item-content {
    flex: 1;
    min-width: 0;
  }

  .history-view-item-title {
    font-size: 13px;
    font-weight: 600;
    color: #1f2430;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .history-view-item-meta {
    font-size: 11px;
    color: #8f97a5;
  }

  .history-view-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    color: #9ca3af;
  }

  .history-view-empty-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }

  .history-view-empty-icon svg {
    width: 24px;
    height: 24px;
    color: #9ca3af;
  }

  .history-view-empty-text {
    font-size: 13px;
    line-height: 1.5;
  }

  .helper-page {
    padding: 0;
    background: linear-gradient(180deg, #f8fafd 0%, #f4f7fb 100%);
    overflow: hidden;
    gap: 0;
  }

  .helper-app-container {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 16px 16px 0;
  }

  .helper-app-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .helper-app-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(145deg, #2d2d2d 0%, #141414 52%, #000000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 18px rgba(15, 15, 15, 0.2);
  }

  .helper-app-icon svg {
    width: 20px;
    height: 20px;
    fill: #fff;
  }

  .helper-app-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a2233;
  }

  .helper-app-desc {
    font-size: 12px;
    color: #697586;
    margin-top: 2px;
  }

  .helper-stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 4px;
  }

  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 2;
  }

  .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #d9e0ea;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #a0abb8;
    transition: all 0.3s;
  }

  .step span {
    font-size: 11px;
    color: #8a94a4;
    font-weight: 500;
    transition: all 0.3s;
  }

  .step.active .step-num {
    border-color: #111111;
    background: #111111;
    color: #fff;
    box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.12);
  }

  .step.active span {
    color: #2f3747;
    font-weight: 700;
  }

  .step.completed .step-num {
    border-color: #111111;
    background: #fff;
    color: #111111;
  }

  .step.completed span {
    color: #111111;
  }

  .step-line {
    flex: 1;
    height: 2px;
    background: #e7ebf1;
    margin: -16px 8px 0;
    transition: background 0.3s;
  }

  .step-line.completed {
    background: #111111;
  }

  .helper-view-content {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow-y: auto;
    padding: 0 4px 16px;
    box-sizing: border-box;
  }

  .helper-view-content::-webkit-scrollbar {
    width: 4px;
  }
  .helper-view-content::-webkit-scrollbar-thumb {
    background: #d0d5dd;
    border-radius: 2px;
  }

  .helper-step-view {
    display: none;
    flex-direction: column;
    height: 100%;
    animation: fadeIn 0.3s ease;
  }

  .helper-step-view.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .helper-upload-area {
    flex: 1;
    border: 2px dashed #d9e0ea;
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    background: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .helper-upload-area:hover {
    border-color: #111111;
    background: #fff;
    box-shadow: 0 8px 20px rgba(15, 15, 15, 0.08);
  }

  .upload-icon {
    font-size: 28px;
    color: #a0abb8;
    margin-bottom: 4px;
    transition: color 0.2s;
  }

  .helper-upload-area:hover .upload-icon {
    color: #111111;
  }

  .upload-text {
    font-size: 13px;
    font-weight: 700;
    color: #2f3747;
  }

  .upload-hint {
    font-size: 12px;
    color: #8a909a;
  }

  .helper-file-card {
    background: #fff;
    border: 1px solid #e7ebf1;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    box-shadow: 0 4px 12px rgba(15,23,42,0.03);
  }

  .file-icon {
    font-size: 24px;
  }

  .file-icon img {
    width: 24px;
    height: 24px;
    display: block;
  }

  .file-info {
    flex: 1;
    min-width: 0;
  }

  .file-name {
    font-size: 13px;
    font-weight: 700;
    color: #1a2233;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .file-status {
    font-size: 12px;
  }

  .file-status.success {
    color: #111111;
  }

  .file-status.error {
    color: #4b5563;
  }

  .file-reupload {
    font-size: 12px;
    color: #111111;
    background: #f3f4f6;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
  }

  .file-reupload:hover {
    background: #e8ebef;
  }

  .helper-preview-box {
    flex: 1;
    min-height: 180px;
    background: #fff;
    border: 1px solid #e7ebf1;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    margin-bottom: 0;
    box-shadow: 0 4px 12px rgba(15,23,42,0.03);
  }

  .preview-header {
    padding: 12px 16px;
    border-bottom: 1px solid #eef2f6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 700;
    color: #2f3747;
    background: #fbfcfe;
  }

  .preview-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview-header-hint {
    font-size: 11px;
    color: #8a94a4;
    font-weight: 400;
  }

  .preview-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    background: #f2f4f7;
    color: #667085;
  }

  .preview-badge.success {
    background: #e8ebef;
    color: #111111;
  }

  .helper-preview-content {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  .helper-preview-content::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  .helper-preview-content::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 3px;
  }
  .helper-preview-content::-webkit-scrollbar-track {
    background: transparent;
  }

  .helper-preview-empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #8a94a4;
    text-align: center;
    padding: 20px;
  }

  .helper-primary-btn {
    width: 100%;
    height: 36px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #252525 0%, #050505 100%);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(15, 15, 15, 0.24);
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    padding: 0 16px;
    white-space: nowrap;
    line-height: 1;
  }

  .helper-primary-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(15, 15, 15, 0.3);
    background: linear-gradient(135deg, #323232 0%, #101010 100%);
  }

  .helper-primary-btn:active {
    transform: translateY(0);
    box-shadow: 0 4px 12px rgba(15, 15, 15, 0.24);
  }

  .helper-primary-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .helper-secondary-btn {
    width: 100%;
    height: 36px;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    background: #f8fafc;
    color: #475569;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 16px;
    white-space: nowrap;
    line-height: 1;
  }

  .helper-toolbar-search {
    width: 100%;
    height: 36px;
    padding: 0 16px 0 34px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    font-size: 13px;
    color: #0f172a;
    outline: none;
    transition: all 0.2s;
    box-sizing: border-box;
  }

  .helper-toolbar-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 36px;

<script>
  const launcher = document.getElementById('assistantLauncher');
  const panel = document.getElementById('assistantPanel');
  const panelHeader = panel ? panel.querySelector('.panel-header') : null;
  const messageList = document.getElementById('messageList');
  const chatInput = document.getElementById('chatInput');
  const panelExpandBtn = document.getElementById('panelExpandBtn');
  const launcherDragHandle = launcher ? launcher.querySelector('.launcher-icon') : null;
  const modeQuickBtn = document.getElementById('modeQuickBtn');
  const modeThinkingBtn = document.getElementById('modeThinkingBtn');
  const PANEL_ANIMATION_MS = 300;
  const PANEL_DEFAULT_WIDTH = 440;
  const PANEL_DEFAULT_HEIGHT = 680;
  const PANEL_EXPANDED_RATIO = 16 / 9;
  const PANEL_EXPANDED_VIEWPORT_SHARE = 0.8;
  const LAUNCHER_EDGE_OFFSET = 32;

  let isOpen = false;
  let isPanelAnimating = false;
  let hasOpenedAssistantPanel = false;
  let activeAssistantPage = 'chat';
  let chatMode = 'quick';
  let isDraggingLauncher = false;
  let hasDraggedLauncher = false;
  let launcherDragStartX = 0;
  let launcherDragStartY = 0;
  let launcherPosition = { x: 0, y: 0 };
  let isDraggingPanel = false;
  let hasDraggedPanel = false;
  let panelDragStartX = 0;
  let panelDragStartY = 0;
  let panelDragOffsetX = 0;
  let panelDragOffsetY = 0;
  let panelPosition = { x: 0, y: 0 };
  let panelAnimationTimer = null;
  let panelHasManualPosition = false;
  let isPanelExpanded = false;
  let panelRestorePosition = null;
  let panelRestoreWasManual = false;
  let conversations = [];
  let currentConversationId = null;

  function getDockedLauncherPosition() {
    const width = launcher.offsetWidth || 68;
    const height = launcher.offsetHeight || 68;
    return {
      x: Math.max(12, window.innerWidth - width - LAUNCHER_EDGE_OFFSET),
      y: Math.max(12, window.innerHeight - height - LAUNCHER_EDGE_OFFSET)
    };
  }

  function clampPanelPositionWithSize(x, y, width, height) {
    const maxX = window.innerWidth - width - 12;
    const maxY = window.innerHeight - height - 12;
    return {
      x: Math.min(Math.max(12, x), Math.max(12, maxX)),
      y: Math.min(Math.max(12, y), Math.max(12, maxY))
    };
  }

  function getDefaultPanelSize() {
    if (window.innerWidth <= 768) {
      return { width: window.innerWidth - 32, height: Math.min(500, window.innerHeight - 120) };
    }
    return { width: PANEL_DEFAULT_WIDTH, height: PANEL_DEFAULT_HEIGHT };
  }

  function clampPanelPosition(x, y) {
    const defaultSize = getDefaultPanelSize();
    const width = panel.offsetWidth || defaultSize.width;
    const height = panel.offsetHeight || defaultSize.height;
    return clampPanelPositionWithSize(x, y, width, height);
  }

  function applyLauncherPosition() {
    launcherPosition = getDockedLauncherPosition();
    launcher.style.left = 'auto';
    launcher.style.top = 'auto';
    launcher.style.right = `${LAUNCHER_EDGE_OFFSET}px`;
    launcher.style.bottom = `${LAUNCHER_EDGE_OFFSET}px`;
  }

  function applyPanelPosition() {
    panel.style.left = `${panelPosition.x}px`;
    panel.style.top = `${panelPosition.y}px`;
    panel.style.right = 'auto';
    panel.style.bottom = 'auto';
  }

  function getLauncherAlignedPanelPosition() {
    const panelWidth = panel.offsetWidth || 440;
    const panelHeight = panel.offsetHeight || 680;
    const alignedX = launcherPosition.x + launcher.offsetWidth - panelWidth;
    const alignedY = launcherPosition.y + launcher.offsetHeight - panelHeight;
    return clampPanelPosition(alignedX, alignedY);
  }

  function syncPanelMorphState() {
    // Morph animation disabled - panel uses simple opacity transition
  }

  function clearPanelAnimationTimer() {
    if (!panelAnimationTimer) return;
    clearTimeout(panelAnimationTimer);
    panelAnimationTimer = null;
  }

  function getExpandedPanelLayout() {
    const maxWidth = window.innerWidth * PANEL_EXPANDED_VIEWPORT_SHARE;
    const maxHeight = window.innerHeight * PANEL_EXPANDED_VIEWPORT_SHARE;
    let width = Math.min(maxWidth, maxHeight * PANEL_EXPANDED_RATIO);
    let height = width / PANEL_EXPANDED_RATIO;
    if (height > maxHeight) { height = maxHeight; width = height * PANEL_EXPANDED_RATIO; }
    return { width: Math.round(width), height: Math.round(height), x: Math.round((window.innerWidth - width) / 2), y: Math.round((window.innerHeight - height) / 2) };
  }

  function updatePanelExpandButton() {
    if (!panelExpandBtn) return;
    panelExpandBtn.title = isPanelExpanded ? '还原' : '放大';
    panelExpandBtn.setAttribute('aria-label', isPanelExpanded ? '还原浮窗' : '放大浮窗');
    panelExpandBtn.innerHTML = isPanelExpanded
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14 4 20"/><path d="M4 15v5h5"/><path d="M14 10 20 4"/><path d="M15 4h5v5"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H4v5"/><path d="M15 4h5v5"/><path d="M9 20H4v-5"/><path d="M15 20h5v-5"/></svg>';
  }

  function applyExpandedPanelLayout() {
    const layout = getExpandedPanelLayout();
    panel.style.width = `${layout.width}px`;
    panel.style.height = `${layout.height}px`;
    panelPosition = { x: layout.x, y: layout.y };
  }

  function applyDefaultPanelLayout() {
    const size = getDefaultPanelSize();
    panel.style.width = `${size.width}px`;
    panel.style.height = `${size.height}px`;
  }

  function togglePanelExpand() {
    if (!isOpen || isPanelAnimating) return;
    if (!isPanelExpanded) {
      panelRestorePosition = { ...panelPosition };
      panelRestoreWasManual = panelHasManualPosition;
      isPanelExpanded = true;
      panelHasManualPosition = true;
      applyExpandedPanelLayout();
    } else {
      isPanelExpanded = false;
      applyDefaultPanelLayout();
      const defaultSize = getDefaultPanelSize();
      panelHasManualPosition = panelRestoreWasManual;
      if (panelRestorePosition) {
        panelPosition = clampPanelPositionWithSize(panelRestorePosition.x, panelRestorePosition.y, defaultSize.width, defaultSize.height);
      } else if (!panelHasManualPosition) {
        panelPosition = getLauncherAlignedPanelPosition();
      } else {
        panelPosition = clampPanelPositionWithSize(panelPosition.x, panelPosition.y, defaultSize.width, defaultSize.height);
      }
    }
    applyPanelPosition();
    syncPanelMorphState();
    updatePanelExpandButton();
  }

  function openPanel() {
    if (isOpen || isPanelAnimating) return;
    if (isPanelExpanded) { applyExpandedPanelLayout(); } else { applyDefaultPanelLayout(); }
    if (!isPanelExpanded && !panelHasManualPosition) { panelPosition = getLauncherAlignedPanelPosition(); }
    applyPanelPosition();
    syncPanelMorphState();
    clearPanelAnimationTimer();
    isPanelAnimating = true;
    panel.classList.remove('closing');
    panel.classList.add('opening');
    launcher.classList.add('is-hidden');
    panel.getBoundingClientRect();
    panel.classList.add('open');
    panelAnimationTimer = setTimeout(() => {
      panel.classList.remove('opening');
      isOpen = true;
      hasOpenedAssistantPanel = true;
      isPanelAnimating = false;
      panelAnimationTimer = null;
    }, PANEL_ANIMATION_MS);
  }

  function closePanel() {
    if ((!isOpen && !panel.classList.contains('opening')) || isPanelAnimating) return;
    syncPanelMorphState();
    clearPanelAnimationTimer();
    isPanelAnimating = true;
    isOpen = false;
    launcher.classList.remove('is-hidden');
    panel.classList.remove('opening');
    panel.classList.add('closing');
    panel.getBoundingClientRect();
    panel.classList.remove('open');
    panelAnimationTimer = setTimeout(() => {
      panel.classList.remove('closing');
      isPanelAnimating = false;
      panelAnimationTimer = null;
    }, PANEL_ANIMATION_MS);
  }

  panelHeader.addEventListener('pointerdown', (event) => {
    if (event.target.closest('.panel-header-actions')) return;
    if (isPanelExpanded) return;
    isDraggingPanel = true;
    hasDraggedPanel = false;
    panelDragStartX = event.clientX;
    panelDragStartY = event.clientY;
    panelDragOffsetX = event.clientX - panelPosition.x;
    panelDragOffsetY = event.clientY - panelPosition.y;
    panelHeader.setPointerCapture(event.pointerId);
  });

  panelHeader.addEventListener('pointermove', (event) => {
    if (!isDraggingPanel) return;
    const moved = Math.hypot(event.clientX - panelDragStartX, event.clientY - panelDragStartY) > 6;
    if (!moved && !hasDraggedPanel) return;
    hasDraggedPanel = true;
    panel.classList.add('dragging');
    panelPosition = clampPanelPosition(event.clientX - panelDragOffsetX, event.clientY - panelDragOffsetY);
    applyPanelPosition();
  });

  function endPanelDrag(event) {
    if (!isDraggingPanel) return;
    isDraggingPanel = false;
    panel.classList.remove('dragging');
    if (hasDraggedPanel) { panelHasManualPosition = true; }
    if (event) { try { panelHeader.releasePointerCapture(event.pointerId); } catch (err) {} }
    setTimeout(() => { hasDraggedPanel = false; }, 0);
  }

  launcherDragHandle.addEventListener('pointerdown', (event) => {
    isDraggingLauncher = true;
    hasDraggedLauncher = false;
    launcherDragStartX = event.clientX;
    launcherDragStartY = event.clientY;
    launcher.classList.add('dragging');
    launcher.setPointerCapture(event.pointerId);
  });

  launcherDragHandle.addEventListener('pointermove', (event) => {
    if (!isDraggingLauncher) return;
    const moved = Math.hypot(event.clientX - launcherDragStartX, event.clientY - launcherDragStartY) > 6;
    if (moved) {
      hasDraggedLauncher = true;
    }
  });

  launcherDragHandle.addEventListener('pointerup', () => {
    isDraggingLauncher = false;
    hasDraggedLauncher = false;
    launcher.classList.remove('dragging');
  });
  launcherDragHandle.addEventListener('pointercancel', () => {
    isDraggingLauncher = false;
    hasDraggedLauncher = false;
    launcher.classList.remove('dragging');
  });
  panelHeader.addEventListener('pointerup', endPanelDrag);
  panelHeader.addEventListener('pointercancel', endPanelDrag);

  launcher.addEventListener('click', function(event) {
    if (hasDraggedLauncher) { event.preventDefault(); return; }
    openPanel();
  });

  launcher.addEventListener('touchend', function(event) {
    if (hasDraggedLauncher) { event.preventDefault(); return; }
    openPanel();
  });

  window.addEventListener('resize', () => {
    applyLauncherPosition();
    if (isPanelExpanded) { applyExpandedPanelLayout(); }
    else if (panelHasManualPosition) { applyDefaultPanelLayout(); panelPosition = clampPanelPosition(panelPosition.x, panelPosition.y); }
    else { applyDefaultPanelLayout(); panelPosition = getLauncherAlignedPanelPosition(); }
    applyPanelPosition();
    syncPanelMorphState();
  });

  updatePanelExpandButton();
  applyLauncherPosition();
  applyDefaultPanelLayout();
  panelPosition = getLauncherAlignedPanelPosition();
  applyPanelPosition();
  syncPanelMorphState();

  // 面板标签页切换
  function switchPanelTab(tab) {
    const chatPage = document.getElementById('assistantChatPage');
    const historyPage = document.getElementById('assistantHistoryPage');
    const navChatBtn = document.getElementById('navChatBtn');
    const navHistoryBtn = document.getElementById('navHistoryBtn');

    if (tab === 'chat') {
      chatPage.classList.add('active');
      historyPage.classList.remove('active');
      navChatBtn.classList.add('active');
      navHistoryBtn.classList.remove('active');
      activeAssistantPage = 'chat';
    } else {
      chatPage.classList.remove('active');
      historyPage.classList.add('active');
      navChatBtn.classList.remove('active');
      navHistoryBtn.classList.add('active');
      activeAssistantPage = 'history';
      renderHistoryList();
    }
  }

  // 加载历史记录
  function loadConversations() {
    try {
      const saved = localStorage.getItem('gac_conversations');
      if (saved) {
        conversations = JSON.parse(saved);
      }
    } catch (e) {
      conversations = [];
    }
    renderHistoryList();
  }

  // 保存历史记录
  function saveConversations() {
    try {
      localStorage.setItem('gac_conversations', JSON.stringify(conversations));
    } catch (e) {
      // localStorage not available
    }
  }

  // 渲染历史记录列表
  function renderHistoryList() {
    const historyViewList = document.getElementById('historyViewList');
    const historyViewEmpty = document.getElementById('historyViewEmpty');
    if (!historyViewList) return;

    if (conversations.length === 0) {
      historyViewList.innerHTML = '';
      if (historyViewEmpty) {
        historyViewList.innerHTML = '<div class="history-view-empty" id="historyViewEmpty"><div class="history-view-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="history-view-empty-text">暂无历史对话<br>开始新对话吧</div></div>';
      }
      return;
    }
    historyViewList.innerHTML = conversations.map(conv => `
      <div class="history-view-item ${conv.id === currentConversationId ? 'active' : ''}" onclick="loadConversation('${conv.id}')">
        <div class="history-view-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="history-view-item-content">
          <div class="history-view-item-title">${escapeHtml(conv.title)}</div>
          <div class="history-view-item-meta">${conv.time || ''}</div>
        </div>
      </div>
    `).join('');
  }

  // HTML转义
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 开始新对话
  function startNewChat() {
    currentConversationId = null;
    messageList.innerHTML = '';
    addWelcomeMessage();
    switchPanelTab('chat');
    renderHistoryList();
  }

  // 加载指定对话
  function loadConversation(id) {
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    currentConversationId = id;
    messageList.innerHTML = '';
    conv.messages.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      if (msg.role === 'ai') {
        div.innerHTML = `<div class="msg-avatar ai-avatar"><img src="assets/assistant-avatar.png" alt="" aria-hidden="true"></div><div><div class="msg-mode-badge ${msg.mode === 'thinking' ? 'thinking' : ''}">${msg.mode === 'thinking' ? '深度思考' : '智能问答'}</div><div class="msg-content">${msg.content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div><div class="msg-time">${msg.time}</div></div>`;
      } else {
        div.innerHTML = `<div class="msg-avatar user-avatar"><img src="assets/user-avatar.png" alt="" aria-hidden="true"></div><div><div class="msg-content">${msg.content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div><div class="msg-time">${msg.time}</div></div>`;
      }
      messageList.appendChild(div);
    });
    messageList.scrollTop = messageList.scrollHeight;
    switchPanelTab('chat');
    renderHistoryList();
  }

  // 添加欢迎消息
  function addWelcomeMessage() {
    const div = document.createElement('div');
    div.className = 'message ai';
    div.innerHTML = `<div class="msg-avatar ai-avatar"><img src="assets/assistant-avatar.png" alt="" aria-hidden="true"></div><div><div class="msg-mode-badge">智能问答</div><div class="msg-content">您好！我是 GAC AI 助手，可以为您查询销量数据、分析市场趋势。请问有什么可以帮您？</div><div class="msg-time">刚刚</div></div>`;
    messageList.appendChild(div);
  }

  // 保存当前对话
  function saveCurrentConversation() {
    const msgs = [];
    messageList.querySelectorAll('.message').forEach(msgEl => {
      const role = msgEl.classList.contains('ai') ? 'ai' : 'user';
      const content = msgEl.querySelector('.msg-content').textContent;
      const time = msgEl.querySelector('.msg-time')?.textContent || '';
      const modeBadge = msgEl.querySelector('.msg-mode-badge');
      const mode = modeBadge?.textContent === '深度思考' ? 'thinking' : 'quick';
      msgs.push({ role, content, time, mode });
    });

    if (msgs.length <= 1) return;

    const firstUserMsg = msgs.find(m => m.role === 'user');
    const title = firstUserMsg ? firstUserMsg.content.substring(0, 20) + (firstUserMsg.content.length > 20 ? '...' : '') : '新对话';

    if (currentConversationId) {
      const conv = conversations.find(c => c.id === currentConversationId);
      if (conv) {
        conv.messages = msgs;
        conv.time = formatTime(new Date());
        conv.title = title;
      }
    } else {
      const newConv = {
        id: 'conv_' + Date.now(),
        title,
        messages: msgs,
        time: formatTime(new Date())
      };
      conversations.unshift(newConv);
      currentConversationId = newConv.id;
      if (conversations.length > 50) {
        conversations = conversations.slice(0, 50);
      }
    }
    saveConversations();
    renderHistoryList();
  }

  // 格式化时间
  function formatTime(date) {
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    return (date.getMonth() + 1) + '月' + date.getDate() + '日';
  }

  // 模式切换
  function selectChatMode(mode) {
    setChatMode(mode);
  }

  function setChatMode(mode) {
    chatMode = mode;
    modeQuickBtn.classList.toggle('active', mode === 'quick');
    modeThinkingBtn.classList.toggle('active', mode === 'thinking');
    if (mode === 'quick') {
      chatInput.placeholder = '发消息或输入 / 选择技能';
    } else {
      chatInput.placeholder = '请输入问题，我会给出更完整的分析';
    }
  }

  function getModeLabel(mode) { return mode === 'thinking' ? '深度思考' : '快速问答'; }

  const responses = {
    quick: {
      '本月销量': '📊 本月全球销量 **12,847 辆**，同比增长 **8.6%**，东南亚贡献最高。',
      '库存预警': '⚠️ 当前库存周转天数 **42 天**，中东区域库存偏高，建议优先去库。',
      '热销车型': '🏆 本月热销 TOP3：\n1. GS3 Emzoom — 3,215 辆\n2. GS5 — 2,847 辆\n3. GS8 — 1,926 辆',
      '市场分析': '🌍 东南亚增长最快，拉美稳定回升，欧洲仍需关注渠道效率。',
      default: ['已收到，当前先给您快速结论。', '好的，已按快速模式返回摘要。', '收到，以下是简要结果。']
    },
    thinking: {
      '本月销量': '📊 **本月销量分析**\n\n**结论：** 本月全球销量 **12,847 辆**，同比增长 **8.6%**。\n\n**拆解：**\n• 东南亚是主要增量来源\n• 中东表现稳定，但结构偏单一\n• 欧洲销量占比不高，渠道转化仍偏弱\n\n**建议：** 继续强化东南亚投放，同时提升欧洲终端转化效率。',
      '库存预警': '⚠️ **库存预警分析**\n\n**现状：** 当前库存周转天数 **42 天**。\n\n**风险点：**\n• 中东区域积压较明显\n• 老车型消化速度放缓\n• 促销资源分配不均\n\n**建议：** 先处理高库龄车型，再做区域化促销和补货优化。',
      '热销车型': '🏆 **热销车型分析**\n\nTOP3：\n1. GS3 Emzoom — 3,215 辆\n2. GS5 — 2,847 辆\n3. GS8 — 1,926 辆\n\n**观察：** GS3 是当前主要增量车型，GS8 更适合高价值市场渗透。',
      '市场分析': '🌍 **区域市场分析**\n\n**东南亚：** 增长明显，产品匹配度高。\n**拉美：** 需求恢复平稳。\n**中东：** 高端车型接受度较好，但库存压力偏高。\n**欧洲：** 品牌认知仍弱，需要提升终端转化。\n\n**建议：** 聚焦东南亚扩张、中东去库、欧洲提效。',
      default: ['已切换为思考模式，下面给您更完整的分析。', '收到，我会按"结论 + 拆解 + 建议"的方式回答。', '好的，以下从数据表现、原因和建议三部分展开。']
    }
  };

  function getReply(key, mode) {
    const group = responses[mode];
    if (group[key]) return group[key];
    const list = group.default;
    return list[Math.floor(Math.random() * list.length)];
  }

  function addMessage(type, text, mode = chatMode) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    const formatted = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    const modeLabel = mode === 'thinking' ? '深度思考' : '智能问答';
    if (type === 'ai') {
      div.innerHTML = `<div class="msg-avatar ai-avatar"><img src="assets/assistant-avatar.png" alt="" aria-hidden="true"></div><div><div class="msg-mode-badge ${mode === 'thinking' ? 'thinking' : ''}">${modeLabel}</div><div class="msg-content">${formatted}</div><div class="msg-time">${timeStr}</div></div>`;
    } else {
      div.innerHTML = `<div class="msg-avatar user-avatar"><img src="assets/user-avatar.png" alt="" aria-hidden="true"></div><div><div class="msg-content">${formatted}</div><div class="msg-time">${timeStr}</div></div>`;
    }
    messageList.appendChild(div);
    messageList.scrollTop = messageList.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    messageList.appendChild(div);
    messageList.scrollTop = messageList.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    const currentMode = chatMode;
    addMessage('user', text);
    showTyping();
    setTimeout(() => {
      hideTyping();
      addMessage('ai', getReply(text, currentMode), currentMode);
      saveCurrentConversation();
    }, currentMode === 'thinking' ? 1300 : 700);
  }

  // 初始化
  loadConversations();
</script>
</body>
</html>
